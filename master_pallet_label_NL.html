<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Pallet Label — NOT LOGGING</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }

  .page-header {
    background: #008533;
    color: #fff;
    padding: 12px 20px;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0;
  }
  .page-header h1 { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  .nl-badge {
    background: #c0392b;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .form-card {
    background: #fff;
    border: 2px solid #008533;
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto 24px auto;
  }

  .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  label { font-size: 11px; font-weight: bold; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select { padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100%; }
  input:focus, select:focus { outline: none; border-color: #008533; }

  .sku-section { margin-top: 4px; }
  .sku-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .sku-row input { flex: 2; }
  .sku-row .qty-input { flex: 1; }
  .sku-row .remove-btn {
    background: #c0392b; color: #fff; border: none; border-radius: 3px;
    padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .add-sku-btn {
    background: #008533; color: #fff; border: none; border-radius: 4px;
    padding: 7px 14px; cursor: pointer; font-size: 13px; margin-top: 4px;
  }
  .add-sku-btn:hover { background: #006628; }

  .merv-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .merv-btn {
    padding: 6px 12px; border: 2px solid #ccc; border-radius: 4px;
    cursor: pointer; font-size: 13px; font-weight: bold; background: #f9f9f9;
    transition: all 0.15s;
  }
  .merv-btn.active { background: #008533; border-color: #008533; color: #fff; }
  .hc-toggle {
    padding: 6px 12px; border: 2px solid #ccc; border-radius: 4px;
    cursor: pointer; font-size: 12px; background: #f9f9f9;
  }
  .hc-toggle.active { background: #e67e22; border-color: #e67e22; color: #fff; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-generate {
    background: #008533; color: #fff; border: none; border-radius: 5px;
    padding: 11px 28px; font-size: 15px; font-weight: bold; cursor: pointer;
  }
  .btn-generate:hover { background: #006628; }
  .btn-clear {
    background: #888; color: #fff; border: none; border-radius: 5px;
    padding: 11px 20px; font-size: 14px; cursor: pointer;
  }

  /* ── LABEL PREVIEW ── */
  #label-preview { display: none; max-width: 700px; margin: 0 auto 20px auto; }
  .preview-header {
    background: #333; color: #fff; padding: 8px 16px;
    font-size: 13px; font-weight: bold; border-radius: 4px 4px 0 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn-print {
    background: #008533; color: #fff; border: none; border-radius: 4px;
    padding: 6px 16px; font-size: 13px; cursor: pointer; font-weight: bold;
  }

  /* ── THE ACTUAL THERMAL LABEL (4"×6" at 96dpi = 384×576px) ── */
  @media screen {
    .label-wrap { background: #fff; padding: 12px; border: 1px solid #ccc; border-top: none; }
  }

  .thermal-label {
    width: 384px;
    min-height: 576px;
    background: #fff;
    border: 6px solid #000;
    padding: 10px;
    font-family: Arial, sans-serif;
    margin: 0 auto;
    position: relative;
  }

  .label-logo-row {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #008533;
    padding: 6px 10px;
    margin-bottom: 8px;
  }
  .label-logo-row span {
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 3px;
  }
  .label-logo-row .tagline {
    color: #fff;
    font-size: 9px;
    letter-spacing: 1px;
    display: block;
    text-align: center;
  }

  .label-title {
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    border-bottom: 2px solid #000;
    padding-bottom: 4px;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .label-field { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .label-field .lf-key { font-size: 10px; font-weight: bold; color: #555; text-transform: uppercase; }
  .label-field .lf-val { font-size: 11px; font-weight: bold; color: #000; }

  .label-dest {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    border: 3px solid #000;
    padding: 4px;
    margin: 6px 0;
    letter-spacing: 2px;
  }

  .label-skus {
    border: 1px solid #999;
    margin-bottom: 6px;
  }
  .label-skus-header {
    background: #222;
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 2px 6px;
  }
  .label-sku-row {
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 3px 6px;
    border-bottom: 1px solid #eee;
    font-size: 11px;
  }
  .label-sku-row:last-child { border-bottom: none; }
  .label-sku-row .sku-name { font-weight: bold; }
  .label-sku-row .sku-qty { font-weight: bold; color: #008533; }

  .label-total {
    border: 2px solid #000;
    text-align: center;
    padding: 4px;
    margin-bottom: 6px;
  }
  .label-total .tot-num { font-size: 30px; font-weight: bold; line-height: 1; }
  .label-total .tot-label { font-size: 9px; text-transform: uppercase; color: #555; }

  .label-load-date {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 2px;
    border: 2px solid #000;
    padding: 6px;
    margin-bottom: 8px;
  }

  .label-barcode-area { text-align: center; margin-top: 6px; }
  .label-barcode-area svg { max-width: 100%; }
  .label-pallet-id {
    font-size: 10px;
    color: #555;
    margin-top: 2px;
    text-align: center;
  }

  /* ── STAGED PALLETS LIST ── */
  #staged-section { max-width: 700px; margin: 0 auto; }
  .staged-header {
    background: #333;
    color: #fff;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 4px 4px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .staged-count { background: #008533; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  .staged-table-wrap { background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; overflow-x: auto; }
  .staged-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .staged-table th { background: #f0f0f0; padding: 6px 10px; text-align: left; border-bottom: 2px solid #ccc; font-size: 11px; text-transform: uppercase; }
  .staged-table td { padding: 6px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
  .staged-table tr:last-child td { border-bottom: none; }
  .tag-dest { display: inline-block; background: #008533; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
  .btn-remove-pallet { background: none; border: 1px solid #c0392b; color: #c0392b; border-radius: 3px; padding: 2px 7px; cursor: pointer; font-size: 11px; }
  .empty-staged { padding: 16px; color: #888; text-align: center; font-size: 13px; }

  /* ── PRINT STYLES ── */
  @media print {
    body { background: #fff; padding: 0; }
    .page-header, .form-card, #staged-section, .preview-header, .btn-print { display: none !important; }
    #label-preview { display: block !important; margin: 0; }
    .label-wrap { padding: 0; border: none; }
    .thermal-label { border: 6px solid #000; margin: 0 auto; }
  }
</style>
</head>
<body>

<div style="max-width:700px;margin:0 auto;">
  <div class="page-header">
    <h1>MASTER PALLET LABEL</h1>
    <span class="nl-badge">⊘ NOT LOGGING</span>
  </div>

  <div class="form-card">
    <!-- MERV -->
    <div class="form-row">
      <div class="form-group" style="flex:2;">
        <label>MERV Rating</label>
        <div class="merv-group" id="merv-buttons">
          <button class="merv-btn" data-merv="M8" onclick="selectMerv(this)">M8</button>
          <button class="merv-btn" data-merv="M11" onclick="selectMerv(this)">M11</button>
          <button class="merv-btn" data-merv="M13" onclick="selectMerv(this)">M13</button>
          <button class="merv-btn" data-merv="OE" onclick="selectMerv(this)">O.E.</button>
          <button class="hc-toggle" id="hc-btn" onclick="toggleHC(this)" title="Stackable modifier">HC</button>
        </div>
      </div>
      <div class="form-group" style="flex:1;">
        <label>Mfg Location</label>
        <select id="mfg-location">
          <option value="Pope">Pope</option>
          <option value="Newberry">Newberry</option>
        </select>
      </div>
    </div>

    <!-- Destination -->
    <div class="form-row">
      <div class="form-group">
        <label>Destination</label>
        <select id="destination">
          <option value="DALLAS DC">DALLAS DC</option>
          <option value="ORLANDO DC">ORLANDO DC</option>
          <option value="ELGIN DC">ELGIN DC</option>
          <option value="3K STORAGE">3K STORAGE</option>
          <option value="POPE SHIPPING">POPE SHIPPING</option>
          <option value="RETAIL SHIPPING">RETAIL SHIPPING</option>
          <option value="WOODLAND EAST">WOODLAND EAST</option>
          <option value="WOODLAND WEST">WOODLAND WEST</option>
          <option value="OTHER">OTHER</option>
        </select>
      </div>
      <div class="form-group">
        <label>Plan Load Date</label>
        <input type="date" id="load-date">
      </div>
    </div>

    <!-- SKUs -->
    <div class="form-group sku-section">
      <label>SKUs on Pallet</label>
      <div id="sku-rows">
        <div class="sku-row">
          <input type="text" placeholder="e.g. AFB16x20x1M13" class="sku-input" oninput="autoUpperCase(this)">
          <input type="number" placeholder="Qty" class="qty-input" min="1">
          <button class="remove-btn" onclick="removeSku(this)">✕</button>
        </div>
      </div>
      <button class="add-sku-btn" onclick="addSkuRow()">+ Add SKU</button>
    </div>

    <div class="btn-row">
      <button class="btn-generate" onclick="generateLabel()">Generate Label</button>
      <button class="btn-clear" onclick="clearForm()">Clear</button>
    </div>
  </div>
</div>

<!-- LABEL PREVIEW -->
<div id="label-preview">
  <div class="preview-header">
    <span>Label Preview</span>
    <button class="btn-print" onclick="window.print()">🖨 Print Label</button>
  </div>
  <div class="label-wrap">
    <div class="thermal-label" id="the-label">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- STAGED PALLETS -->
<div id="staged-section" style="max-width:700px;margin:24px auto 0 auto;">
  <div class="staged-header">
    <span>Staged Pallets</span>
    <span class="staged-count" id="staged-count">0</span>
  </div>
  <div class="staged-table-wrap">
    <div id="staged-empty" class="empty-staged">No pallets staged yet. Generate a label to stage a pallet.</div>
    <table class="staged-table" id="staged-table" style="display:none;">
      <thead>
        <tr>
          <th>Pallet ID</th>
          <th>Dest</th>
          <th>SKUs</th>
          <th>Total Qty</th>
          <th>Load Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="staged-tbody"></tbody>
    </table>
  </div>
</div>

<script>
// ── STATE ──
let selectedMerv = '';
let highCapacity = false;
let stagedPallets = JSON.parse(localStorage.getItem('fb_staged_pallets_nl') || '[]');

// Restore load date
const savedDate = localStorage.getItem('fb_pallet_load_date_nl');
if (savedDate) document.getElementById('load-date').value = savedDate;
document.getElementById('load-date').addEventListener('change', function() {
  localStorage.setItem('fb_pallet_load_date_nl', this.value);
});

// ── MERV ──
function selectMerv(btn) {
  document.querySelectorAll('.merv-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMerv = btn.dataset.merv;
}
function toggleHC(btn) {
  highCapacity = !highCapacity;
  btn.classList.toggle('active', highCapacity);
}

// ── SKU ROWS ──
function addSkuRow() {
  const row = document.createElement('div');
  row.className = 'sku-row';
  row.innerHTML = `
    <input type="text" placeholder="e.g. AFB16x20x1M13" class="sku-input" oninput="autoUpperCase(this)">
    <input type="number" placeholder="Qty" class="qty-input" min="1">
    <button class="remove-btn" onclick="removeSku(this)">✕</button>
  `;
  document.getElementById('sku-rows').appendChild(row);
}
function removeSku(btn) {
  const rows = document.querySelectorAll('.sku-row');
  if (rows.length > 1) btn.closest('.sku-row').remove();
}
function autoUpperCase(el) { el.value = el.value.toUpperCase(); }

// ── GENERATE ──
function generateLabel() {
  const skuRows = document.querySelectorAll('.sku-row');
  const skus = [];
  let totalQty = 0;
  for (const row of skuRows) {
    const sku = row.querySelector('.sku-input').value.trim().toUpperCase();
    const qty = parseInt(row.querySelector('.qty-input').value) || 0;
    if (sku && qty > 0) { skus.push({ sku, qty }); totalQty += qty; }
  }
  if (skus.length === 0) { alert('Add at least one SKU with a quantity.'); return; }
  if (!selectedMerv) { alert('Select a MERV rating.'); return; }

  const dest    = document.getElementById('destination').value;
  const mfg     = document.getElementById('mfg-location').value;
  const rawDate = document.getElementById('load-date').value;
  const mervLabel = selectedMerv + (highCapacity ? ' HC' : '');

  // Build pallet ID: FB-MMDDYY-XXXXX
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const yy = String(now.getFullYear()).slice(-2);
  const rand = Math.random().toString(36).slice(2,7).toUpperCase();
  const palletId = `FB-${mm}${dd}${yy}-${rand}`;

  // Format load date
  let loadDateDisplay = '';
  if (rawDate) {
    const d = new Date(rawDate + 'T00:00:00');
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const dayStr = days[d.getDay()];
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    const yr = String(d.getFullYear()).slice(-2);
    loadDateDisplay = `${dayStr}  ${mo}-${dy}-${yr}`;
  }

  // Build label HTML
  const label = document.getElementById('the-label');
  label.innerHTML = `
    <div class="label-logo-row">
      <div>
        <span>FILTERBUY</span>
        <span class="tagline">BETTER AIR FOR ALL</span>
      </div>
    </div>
    <div class="label-title">MASTER PALLET LABEL</div>

    <div class="label-field">
      <span class="lf-key">MERV</span><span class="lf-val">${mervLabel}</span>
    </div>
    <div class="label-field">
      <span class="lf-key">Mfg Location</span><span class="lf-val">${mfg}</span>
    </div>

    <div class="label-dest">${dest}</div>

    <div class="label-skus">
      <div class="label-skus-header"><span>SKU</span><span>QTY</span></div>
      ${skus.map(s => `<div class="label-sku-row"><span class="sku-name">${s.sku}</span><span class="sku-qty">${s.qty}</span></div>`).join('')}
    </div>

    <div class="label-total">
      <div class="tot-num">${totalQty}</div>
      <div class="tot-label">Total Pieces</div>
    </div>

    ${loadDateDisplay ? `<div class="label-load-date" id="load-date-display">${loadDateDisplay}</div>` : ''}

    <div class="label-barcode-area">
      <svg id="pallet-barcode"></svg>
      <div class="label-pallet-id">${palletId}</div>
    </div>
  `;

  JsBarcode('#pallet-barcode', palletId, {
    format: 'CODE128',
    width: 2,
    height: 48,
    displayValue: false,
    margin: 4
  });

  // Fit load date text
  if (loadDateDisplay) fitText('load-date-display', 340, 26, 18);

  document.getElementById('label-preview').style.display = 'block';
  document.getElementById('label-preview').scrollIntoView({ behavior: 'smooth' });

  // Stage pallet in localStorage
  const pallet = { id: palletId, dest, mfg, merv: mervLabel, skus, totalQty, loadDate: rawDate || '', loadDateDisplay, timestamp: new Date().toISOString() };
  stagedPallets.push(pallet);
  localStorage.setItem('fb_staged_pallets_nl', JSON.stringify(stagedPallets));
  renderStagedTable();
}

function fitText(elId, maxWidth, maxFont, minFont) {
  const el = document.getElementById(elId);
  if (!el) return;
  let size = maxFont;
  el.style.fontSize = size + 'px';
  while (el.scrollWidth > maxWidth && size > minFont) {
    size--;
    el.style.fontSize = size + 'px';
  }
}

// ── STAGED TABLE ──
function renderStagedTable() {
  const tbody = document.getElementById('staged-tbody');
  const empty = document.getElementById('staged-empty');
  const table = document.getElementById('staged-table');
  const count = document.getElementById('staged-count');
  count.textContent = stagedPallets.length;

  if (stagedPallets.length === 0) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = stagedPallets.map((p, i) => `
    <tr>
      <td style="font-family:monospace;font-size:11px;">${p.id}</td>
      <td><span class="tag-dest">${p.dest}</span></td>
      <td>${p.skus.map(s => `${s.sku} ×${s.qty}`).join('<br>')}</td>
      <td style="font-weight:bold;">${p.totalQty}</td>
      <td>${p.loadDateDisplay || p.loadDate || '—'}</td>
      <td><button class="btn-remove-pallet" onclick="removePallet(${i})">Remove</button></td>
    </tr>
  `).join('');
}

function removePallet(idx) {
  stagedPallets.splice(idx, 1);
  localStorage.setItem('fb_staged_pallets_nl', JSON.stringify(stagedPallets));
  renderStagedTable();
}

function clearForm() {
  document.querySelectorAll('.sku-input').forEach(i => i.value = '');
  document.querySelectorAll('.qty-input').forEach(i => i.value = '');
  document.querySelectorAll('.merv-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('hc-btn').classList.remove('active');
  selectedMerv = '';
  highCapacity = false;
  document.getElementById('label-preview').style.display = 'none';
}

// ── INIT ──
renderStagedTable();
</script>
</body>
</html>
